name: PR Validation

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  validate-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Validate PR description
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || "";

            if (!body.includes("## Description")) {
              core.setFailed("Missing '## Description'");
            }

            if (!body.includes("## Checklist")) {
              core.setFailed("Missing '## Checklist'");
            }

            if (!body.includes("## Related Issue")) {
              core.setFailed("Missing '## Related Issue'");
            }

      - name: Validate checklist
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || "";
            const unchecked = body.match(/- \[ \]/g);

            if (unchecked) {
              core.setFailed("Checklist not completed");
            }

      - name: Validate branch name
        run: |
          branch="${{ github.head_ref }}"

          if [[ ! "$branch" =~ ^group-[0-9]+-.*$ ]]; then
            echo "Branch must be: group-XX-description"
            exit 1
          fi

      - name: Validate changed files location (API SAFE)
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request.number;

            const files = await github.paginate(
              github.rest.pulls.listFiles,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr
              }
            );

            const paths = files.map(f => f.filename);

            console.log("Files:", paths);

            const groupFolder = paths.find(p => p.startsWith("groups/group-"));

            if (!groupFolder) {
              core.setFailed("Files must be inside groups/group-XX/");
            }

            const invalid = paths.filter(p => !p.startsWith(groupFolder.split('/').slice(0,2).join('/')));

            if (invalid.length > 0) {
              core.setFailed("Files outside group folder detected");
            }
